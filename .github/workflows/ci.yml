name: CI

# CI runs on every push and PR. The release job runs only on pushes to master:
# it patch-bumps the version, commits + tags back to master with [skip ci],
# and publishes to npm via the GitHub Trusted Publisher (OIDC) flow.
#
# No NPM_TOKEN secret is required — the GitHub OIDC token is exchanged for
# an npm publish token automatically when `npm publish --provenance` runs
# in a workflow that has `id-token: write` permission.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel older runs on the same ref when a new one starts.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run test:e2e

  release:
    name: Bump and publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      # Push the version bump + tag back to master.
      contents: write
      # Required for npm provenance + Trusted Publisher OIDC token exchange.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so npm version can compute correctly relative to tags.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; `contents: write` lets us push.
          # If master has branch protection that blocks bot pushes, allow
          # github-actions[bot] to bypass it (Settings → Branches → Rule).

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Configure git for the bump commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch, commit, tag
        id: bump
        run: |
          # --no-git-tag-version: don't auto-commit/tag; we do it ourselves
          # so we can include [skip ci] and push commit + tag in one shot.
          new_version=$(npm version patch --no-git-tag-version)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "chore(release): $new_version [skip ci]"
          git tag -a "$new_version" -m "$new_version"
          git push origin HEAD:master
          git push origin "$new_version"
          echo "Released $new_version"

      - name: Build
        run: npm run build

      - name: Debug OIDC claims (compare against npm TP config)
        # ACTIONS_ID_TOKEN_REQUEST_TOKEN/URL are auto-provided because the
        # job has `id-token: write`. Decoding the JWT payload reveals the
        # claims (repository, workflow_ref, sub, environment, ...) that
        # npm's Trusted Publisher matches against — useful when publish
        # fails with a misleading 404.
        run: |
          token=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | python3 -c 'import sys, json; print(json.load(sys.stdin)["value"])')
          payload=$(echo "$token" | cut -d. -f2)
          pad=$((4 - ${#payload} % 4)); [ $pad -lt 4 ] && payload="$payload$(printf '=%.0s' $(seq 1 $pad))"
          echo "$payload" | tr '_-' '/+' | base64 -d 2>/dev/null | python3 -m json.tool

      - name: Publish to npm with provenance (OIDC)
        # No NODE_AUTH_TOKEN env: with `id-token: write` and a Trusted
        # Publisher configured on npm for this repo, the npm CLI exchanges
        # the GitHub OIDC token for a short-lived publish token at the
        # registry. --provenance attaches a verifiable build attestation.
        run: npm publish --provenance --access public
