name: CI

# CI runs on every push and PR. The release job runs only on pushes to master:
# it patch-bumps the version, commits + tags back to master with [skip ci],
# publishes to npm with provenance, and creates a GitHub Release.
#
# Publish lives in this job (not a separate tag-triggered workflow) because
# tags pushed by the default GITHUB_TOKEN do not trigger `on: push: tags`
# workflows.
#
# No NPM_TOKEN secret is required — the GitHub OIDC token is exchanged for
# an npm publish token automatically when `npm publish --provenance` runs
# in a job that has `id-token: write` permission (Trusted Publisher).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel older runs on the same ref when a new one starts.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }}, HB ${{ matrix.homebridge-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.x', '24.x']
        homebridge-version: ['^1.8.0', '^2.0.0']
    env:
      HB_VERSION: ${{ matrix.homebridge-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci
      - run: npm run install:homebridge

      - name: Verify installed Homebridge major matches matrix
        run: |
          installed=$(node -p "JSON.parse(require('fs').readFileSync('node_modules/homebridge/package.json')).version")
          expected_major=$(printf '%s' "$HB_VERSION" | sed -E 's/^[^0-9]*([0-9]+).*/\1/')
          installed_major=${installed%%.*}
          echo "Matrix HB_VERSION=$HB_VERSION → expecting major $expected_major; installed homebridge@$installed (major $installed_major)"
          if [ "$expected_major" != "$installed_major" ]; then
            echo "::error::installed Homebridge major ($installed_major) does not match matrix ($expected_major)"
            exit 1
          fi

      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run test:e2e

  check-changes:
      name: Check for code changes
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      runs-on: ubuntu-latest
      outputs:
        code: ${{ steps.filter.outputs.code }}
      steps:
        - uses: actions/checkout@v4
        - uses: dorny/paths-filter@v3
          id: filter
          with:
            filters: |
              code:
                - 'src/**'
                - 'package.json'
                - 'package-lock.json'
                - 'tsconfig.json'
                - 'config.schema.json'
  release:
    name: Release
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.check-changes.outputs.code == 'true'
    needs: [test, check-changes]
    runs-on: ubuntu-latest
    permissions:
      # contents: write — push the version bump + tag, create the GH Release.
      # id-token: write — npm Trusted Publisher OIDC token exchange + provenance.
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}          
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; `contents: write` lets us push.
          # If master has branch protection that blocks bot pushes, allow
          # github-actions[bot] to bypass it (Settings → Branches → Rule).

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Configure git for the bump commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch, prepare notes, commit, tag
        id: bump
        run: |
          # --no-git-tag-version: don't auto-commit/tag; we do it ourselves
          # so we can include [skip ci] and push commit + tag in one shot.
          # The `version` script in package.json runs conventional-changelog,
          # which prepends a new section to CHANGELOG.md.
          npm version patch --no-git-tag-version

          # Extract + validate release notes BEFORE any side effects (commit,
          # tag, push, npm publish). A malformed CHANGELOG aborts the release
          # cleanly with no remote state changed.
          awk '/^## \[/{n++; if(n>1) exit} /^# Changelog/{exit} {print}' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ] || ! head -n 1 /tmp/notes.md | grep -q '^## \['; then
            echo "::error::release notes are empty or don't start with '## [' — aborting before any push"
            head -n 5 /tmp/notes.md || true
            exit 1
          fi

          git add package.json package-lock.json CHANGELOG.md
          new_version=$(node -p "require('./package.json').version")
          tag="v$new_version"
          git commit -m "Bump version to $new_version [skip ci]"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          git tag "$tag"
          git push origin HEAD:master
          git push origin "$tag"
          echo "Released $tag"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # /tmp/notes.md was extracted and validated in the bump step.
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file /tmp/notes.md

      - name: Install Homebridge (for tsc types)
        run: npm run install:homebridge

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance (OIDC)
        run: npm publish --provenance --access public            