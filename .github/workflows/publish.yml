name: Publish

# Triggered when ci.yml pushes a version tag (e.g. v1.2.3).
# Publishes to npm via GitHub Trusted Publisher (OIDC) — no NPM_TOKEN needed.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      # Required for npm provenance + Trusted Publisher OIDC token exchange.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # TP needs npm ≥ 11.5+; Node 20 ships npm 10.x and silently fails.
          node-version: '24.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance (OIDC)
        run: npm publish --provenance --access public